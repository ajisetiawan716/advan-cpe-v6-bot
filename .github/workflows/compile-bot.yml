name: Compile Advan CPE V6 Bot IPK

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'index.js'
      - 'package.json'
      - 'handlers/**'
      - 'modem/**'
      - 'utils/**'
      - 'sessions/**'
      - 'files/**'
      - 'Makefile'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      current_version: ${{ steps.current_version.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          V=$(grep 'PKG_VERSION:=' ./Makefile | awk -F '=' '{gsub(/[ \t]/,"",$2); print $2}')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "New: $V"

      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: package

      - name: Read current version
        id: current_version
        shell: bash
        run: |
          CV=$(cat ./main/version 2>/dev/null | head -1 | sed 's/^v//' || echo "0")
          echo "version=$CV" >> "$GITHUB_OUTPUT"
          echo "Current: $CV"

  compile:
    runs-on: ubuntu-latest
    needs: get_version
    if: ${{ needs.get_version.outputs.version != needs.get_version.outputs.current_version }}
    env:
      PKG_NAME: advan-bot
      SDK_URL: https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install prerequisites
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get -y install git wget xz-utils zstd tar rsync file

      - name: Setup dirs
        run: |
          echo "TMPDIR=${{ runner.temp }}/sdk" >> "$GITHUB_ENV"
          echo "OUTDIR=${{ runner.temp }}/out" >> "$GITHUB_ENV"
          mkdir -p "${{ runner.temp }}/sdk" "${{ runner.temp }}/out"

      - name: Download & extract SDK
        run: |
          cd "$TMPDIR"
          wget -q "$SDK_URL" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* SDK

      - name: Copy package to SDK
        run: |
          rsync -av --exclude='.git' --exclude='node_modules' \
                --exclude='.github' --exclude='*.ipk' \
                "$GITHUB_WORKSPACE/" "$TMPDIR/SDK/package/$PKG_NAME/"

      - name: Prepare feeds (minimal)
        run: |
          cd "$TMPDIR/SDK"
          # HANYA update feeds yang diperlukan
          ./scripts/feeds update packages luci 2>/dev/null || true
          # Install hanya dependensi yang diperlukan
          ./scripts/feeds install node 2>/dev/null || true
          ./scripts/feeds install ca-certificates 2>/dev/null || true
          make defconfig

      - name: Build package only
        run: |
          cd "$TMPDIR/SDK"
          make package/$PKG_NAME/compile -j$(nproc) V=s

      - name: Collect artifacts
        run: |
          find "$TMPDIR/SDK/bin" -name "${PKG_NAME}_*.ipk" -exec cp -v {} "$OUTDIR"/ \;
          ls -lh "$OUTDIR"/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: advan-bot-${{ needs.get_version.outputs.version }}
          path: ${{ runner.temp }}/out/*.ipk
          retention-days: 30

      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: package

      - name: Publish to package/main
        run: |
          mkdir -p ./main
          rm -f ./main/${PKG_NAME}_*.ipk
          echo "v${{ needs.get_version.outputs.version }}" > ./main/version
          cp -v "$OUTDIR"/*.ipk ./main/
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "v${{ needs.get_version.outputs.version }}" || echo "No changes"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bot-v${{ needs.get_version.outputs.version }}
          name: Bot v${{ needs.get_version.outputs.version }}
          files: ${{ runner.temp }}/out/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}