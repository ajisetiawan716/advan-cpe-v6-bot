name: Compile Advan CPE V6 Bot IPK

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'index.js'
      - 'package.json'
      - 'handlers/**'
      - 'modem/**'
      - 'utils/**'
      - 'sessions/**'
      - 'files/**'
      - 'Makefile'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      current_version: ${{ steps.current_version.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Read PKG_VERSION from Makefile
        id: version
        shell: bash
        run: |
          V=$(grep 'PKG_VERSION:=' ./Makefile | awk -F '=' '{gsub(/[ \t]/,"",$2); print $2}')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "New Version: $V"

      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: package

      - name: Read current version
        id: current_version
        shell: bash
        run: |
          if [ -f "./${{ github.ref_name }}/version" ]; then
            CV=$(sed -n '1p' "./${{ github.ref_name }}/version" | awk -F 'v' '{print $2}')
          else
            CV=0
          fi
          echo "version=$CV" >> "$GITHUB_OUTPUT"
          echo "Current Version: $CV"

  compile:
    runs-on: ubuntu-latest
    needs: get_version
    if: ${{ needs.get_version.outputs.version != needs.get_version.outputs.current_version }}
    env:
      PKG_NAME: advan-bot
      SDK_IPK_URL: https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install prerequisites
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install git curl wget ca-certificates xz-utils zstd bzip2 tar build-essential \
                                  python3 rsync file

      - name: Prep dirs (outside repo)
        run: |
          echo "TMPDIR=$GITHUB_WORKSPACE/../tmp"  >> "$GITHUB_ENV"
          echo "OUTDIR=$GITHUB_WORKSPACE/../_out" >> "$GITHUB_ENV"
          mkdir -p "$GITHUB_WORKSPACE/../tmp" "$GITHUB_WORKSPACE/../_out"

      - name: Download & extract SDK (IPK / stable)
        shell: bash
        run: |
          set -euo pipefail
          cd "$TMPDIR"

          URL="${{ env.SDK_IPK_URL }}"
          FN="$(basename "$URL")"
          echo "Downloading (IPK): $URL"
          wget -q -O "$FN" "$URL"

          case "$FN" in
            *.tar.zst|*.zst)    tar --zstd -xf "$FN" ;;
            *.tar.xz|*.xz)      tar -xJf "$FN" ;;
            *.tar.gz|*.tgz)     tar -xzf "$FN" ;;
            *.tar.bz2|*.tbz2)   tar -xjf "$FN" ;;
            *.tar)              tar -xf  "$FN" ;;
            *) echo "Unknown archive format: $FN" >&2; exit 2 ;;
          esac

          SDKDIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          [ -n "$SDKDIR" ] || { echo "SDK dir not found after extract"; ls -la; exit 3; }
          mv "$SDKDIR" SDK_IPK

      - name: Prepare minimal feeds & link package (IPK)
        run: |
          set -eux
          cd "$TMPDIR/SDK_IPK"
          ./scripts/feeds update luci
          rm -rf package/$PKG_NAME
          ln -s "$GITHUB_WORKSPACE" "package/$PKG_NAME"
          make defconfig

      - name: Build (IPK / stable) - only this package
        run: |
          set -eux
          cd "$TMPDIR/SDK_IPK"
          make package/$PKG_NAME/compile -j$(nproc) V=sc

      - name: Collect artifacts (.ipk) - only advan-bot
        id: collect
        run: |
          set -eux
          find "$TMPDIR/SDK_IPK/bin" -type f -name "advan-bot_*.ipk" -exec cp -v {} "$OUTDIR"/ \; || true
          ls -lh "$OUTDIR" || true
          echo "count=$(ls -1 "$OUTDIR"/* 2>/dev/null | wc -l || true)" >> "$GITHUB_OUTPUT"

      - name: Assert artifacts exist
        run: |
          test -d "$OUTDIR" || { echo "No OUTDIR"; exit 1; }
          ls "$OUTDIR"/advan-bot_*.ipk 2>/dev/null || { echo "No advan-bot ipk found"; exit 1; }

      - name: Create GitHub Release (upload .ipk)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get_version.outputs.version }}
          name: v${{ needs.get_version.outputs.version }}
          files: |
            ${{ env.OUTDIR }}/advan-bot_*.ipk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Switch to package branch
        uses: actions/checkout@v4
        with:
          ref: package
          clean: true

      - name: Publish artifacts to package/dev and package/main
        run: |
          set -eux
          for DEST in dev main; do
            mkdir -p "./$DEST"
            rm -f "./$DEST/${{ env.PKG_NAME }}*.ipk" || true
            echo "v${{ needs.get_version.outputs.version }}" > "./$DEST/version"
            cp -v "$OUTDIR"/advan-bot_*.ipk "./$DEST/" 2>/dev/null || true
          done

          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto Package Update: v${{ needs.get_version.outputs.version }}" || true
          git push

      - name: Cleanup OUTDIR
        if: always()
        run: |
          rm -rf "$OUTDIR" || true