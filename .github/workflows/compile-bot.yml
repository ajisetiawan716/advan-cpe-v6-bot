name: Compile Advan CPE V6 Bot IPK

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'index.js'
      - 'package.json'
      - 'handlers/**'
      - 'modem/**'
      - 'utils/**'
      - 'sessions/**'
      - 'files/**'
      - 'Makefile'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      current_version: ${{ steps.current_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          V=$(grep 'PKG_VERSION:=' ./Makefile | awk -F '=' '{gsub(/[ \t]/,"",$2); print $2}')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "New: $V"

      - uses: actions/checkout@v4
        with:
          ref: package

      - name: Read current version
        id: current_version
        run: |
          CV=$(cat ./main/version 2>/dev/null | head -1 | sed 's/^v//' || echo "0")
          echo "version=$CV" >> "$GITHUB_OUTPUT"

  compile:
    runs-on: ubuntu-latest
    needs: get_version
    if: ${{ needs.get_version.outputs.version != needs.get_version.outputs.current_version }}
    env:
      PKG_NAME: advan-bot
      SDK_URL: https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get -y install wget xz-utils zstd tar

      - name: Setup dirs
        run: |
          echo "TMPDIR=${{ runner.temp }}/sdk" >> "$GITHUB_ENV"
          echo "OUTDIR=${{ runner.temp }}/out" >> "$GITHUB_ENV"
          mkdir -p "${{ runner.temp }}/sdk" "${{ runner.temp }}/out"

      - name: Download & extract SDK
        run: |
          cd "$TMPDIR"
          wget -q "$SDK_URL" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* SDK

      - name: Copy package to SDK
        run: |
          rsync -av --exclude='.git' --exclude='node_modules' \
                --exclude='.github' --exclude='*.ipk' \
                "$GITHUB_WORKSPACE/" "$TMPDIR/SDK/package/$PKG_NAME/"

      - name: Build (SKIP feeds, direct compile)
        run: |
          cd "$TMPDIR/SDK"
          # TIDAK PERLU feeds update/install
          # Langsung compile paket saja (tidak ada dependensi compile)
          make package/$PKG_NAME/compile -j$(nproc) V=s IGNORE_ERRORS=1 2>&1 || {
            echo "Checking if package was built..."
            find bin -name "${PKG_NAME}_*.ipk" 2>/dev/null
          }

      - name: Collect artifacts
        run: |
          find "$TMPDIR/SDK/bin" -name "${PKG_NAME}_*.ipk" -exec cp -v {} "$OUTDIR"/ \;
          ls -lh "$OUTDIR/" || echo "No IPK found"
          test -f "$OUTDIR"/*.ipk || { echo "ERROR: No IPK!"; exit 1; }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: advan-bot-${{ needs.get_version.outputs.version }}
          path: ${{ runner.temp }}/out/*.ipk
          retention-days: 30

      - uses: actions/checkout@v4
        with:
          ref: package

      - name: Publish to package/main
        run: |
          mkdir -p ./main
          rm -f ./main/${PKG_NAME}_*.ipk
          echo "v${{ needs.get_version.outputs.version }}" > ./main/version
          cp -v "$OUTDIR"/*.ipk ./main/
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "v${{ needs.get_version.outputs.version }}" || echo "No changes"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bot-v${{ needs.get_version.outputs.version }}
          name: Bot v${{ needs.get_version.outputs.version }}
          files: ${{ runner.temp }}/out/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}